<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTAL KEHADIRAN SEEP 2026</title>
    <style>
        :root {
            /* Warna Bendera Sarawak */
            --swk-yellow: #FCD116;
            --swk-red: #ED1C24;
            --swk-black: #000000;
            --bg-color: #f4f4f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--swk-black);
            color: #333;
            padding-bottom: 80px; /* Ruang untuk butang tetap di bawah */
        }

        .header-container {
            background-color: var(--swk-black);
            text-align: center;
            border-bottom: 5px solid var(--swk-yellow);
        }

        .header-img {
            width: 100%;
            height: auto;
            max-height: 200px;
            object-fit: cover;
            border-bottom: 3px solid var(--swk-red);
        }

        .logo-img {
            width: 100px;
            margin-top: -50px;
            background: white;
            border-radius: 50%;
            padding: 5px;
            border: 3px solid var(--swk-yellow);
            position: relative;
            z-index: 2;
        }

        h1 {
            color: var(--swk-yellow);
            margin: 10px 0 5px;
            font-size: 1.5rem;
            text-transform: uppercase;
        }
        
        h2 {
            color: white;
            font-size: 1rem;
            margin: 0 0 15px 0;
        }

        .container {
            background: white;
            margin: 15px;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-top: 4px solid var(--swk-red);
        }

        input[type="text"], input[type="number"], select, input[type="date"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .btn {
            background-color: var(--swk-red);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
        }

        .btn:hover { background-color: #c9161d; }

        /* Butang Kehadiran */
        .student-card {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 5px solid var(--swk-black);
        }
        .student-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
        .att-buttons {
            display: flex;
            gap: 10px;
        }
        .att-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid transparent;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            color: #fff;
        }
        .btn-hadir { background: #28a745; }
        .btn-sebab { background: var(--swk-yellow); color: black; border: 1px solid #ccc;}
        .btn-tanpa { background: var(--swk-red); }
        .att-btn.selected {
            border: 3px solid black;
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        /* Navigasi Bawah */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--swk-black);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 3px solid var(--swk-yellow);
            z-index: 1000;
        }
        .bottom-nav button {
            background: none;
            border: none;
            color: white;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }
        .bottom-nav button i { font-size: 20px; margin-bottom: 5px; color: var(--swk-yellow); }

        footer {
            text-align: center;
            color: white;
            padding: 20px;
            font-size: 0.8rem;
        }

        .hidden { display: none; }
        
        /* Dashboard Table */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: var(--swk-red); color: white; }
        
        .action-btn { padding: 5px 10px; border: none; border-radius: 3px; cursor:pointer; font-weight: bold; margin: 2px;}
        .edit-btn { background: var(--swk-yellow); color: black; }
        .del-btn { background: var(--swk-red); color: white; }

        .loader {
            text-align: center; font-weight: bold; color: var(--swk-red); padding: 20px;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="https://i.ibb.co/PZ0SKRtr/HEADER-SEEP-2026.png" alt="Header" class="header-img">
        <img src="https://i.ibb.co/VYSKMXf1/Logo-Selirik.png" alt="Logo Sekolah" class="logo-img">
        <h1>PORTAL KEHADIRAN SEEP</h1>
        <h2>TAHUN 2026</h2>
    </div>

    <!-- SEKSYEN LOGIN -->
    <div id="login-section" class="container">
        <h3>Log Masuk Guru</h3>
        <label>No. Kad Pengenalan:</label>
        <input type="number" id="ic-input" placeholder="No Kad Pengenalan (Tanpa '-')" onkeydown="if(event.key==='Enter') login()">
        <button class="btn" onclick="login()">Log Masuk</button>
        <p id="login-error" style="color: red; display: none;">No Kad Pengenalan tidak dijumpai.</p>
    </div>

    <!-- SEKSYEN PILIHAN KELAS & SESI -->
    <div id="selection-section" class="container hidden">
        <h3 id="welcome-text"></h3>
        
        <label>Pilih Subjek / Kelas:</label>
        <select id="subject-select"></select>

        <label>Sesi:</label>
        <select id="session-select">
            <script>
                for(let i=1; i<=18; i++) document.write(`<option value="SESI ${i}">SESI ${i}</option>`);
            </script>
        </select>

        <label>Tarikh:</label>
        <input type="date" id="date-select" required>

        <button class="btn" onclick="loadStudents()">Teruskan</button>
    </div>

    <!-- SEKSYEN TANDA KEHADIRAN -->
    <div id="attendance-section" class="container hidden">
        <h3>Senarai Pelajar: <span id="display-subject"></span></h3>
        <p>Sesi: <span id="display-session"></span> | Tarikh: <span id="display-date"></span></p>
        <div id="loading" class="loader hidden">Memuat turun data pelajar...</div>
        <div id="student-list"></div>
    </div>

    <!-- SEKSYEN DASHBOARD (SEMAKAN) -->
    <div id="dashboard-section" class="container hidden">
        <h3>Semak & Kemaskini Rekod</h3>
        <div style="overflow-x: auto;">
            <table id="dashboard-table">
                <thead>
                    <tr>
                        <th>Tarikh</th>
                        <th>Sesi</th>
                        <th>Subjek</th>
                        <th>Status Disimpan</th>
                        <th>Tindakan</th>
                    </tr>
                </thead>
                <tbody id="dashboard-body"></tbody>
            </table>
        </div>
    </div>

    <!-- NAVIGASI BAWAH (BOTTOM MENU) -->
    <div class="bottom-nav hidden" id="bottom-menu">
        <button onclick="goBack()">
            <i>⬅️</i><br>Kembali
        </button>
        <button onclick="saveAndSubmit()">
            <i>💾</i><br>Simpan & Hantar
        </button>
        <button onclick="showDashboard()">
            <i>📋</i><br>Semak Rekod
        </button>
        <button onclick="logout()">
            <i>🚪</i><br>Keluar
        </button>
    </div>

    <footer>
        Hakcipta NDJE@Selirik, Kapit 2026
    </footer>

        const csvLinks = {
            1: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQCbmoYUWEIQIYGLveu-q4TOsYjzT_1mq6w2-m_m0Q5e5G2Oy0G9dXVP3yxNHjY4qjZQ3LIKx9j2gvl/pub?gid=154786193&single=true&output=csv",

            4: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRoPGa6YjNCurNwaGTABEflsRqSactw6orXWR6w3AlIn-25LgczQxahCu7rPRVlnKbQWndUz0rdtKAy/pub?output=csv",
            5: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQPx_Vym9O7mQejaGpkZjLEeTtu5sGxB36NRnPhc88YPAA0JyW64m5gg8XdEPi67QQul-jkUpv-Vczj/pub?output=csv"
        };

        const scriptLinks = {
            1: "https://script.google.com/macros/s/AKfycbx_pNQXMmpZBqs9l4chk_SNLXzCeTHNuCMY-fp4RvBdQYW1sEkoWJhKrgKr1ZCKmzdd/exec",
            2: "https://script.google.com/macros/s/AKfycbw6KASc9M-Ot2BUYRSYUQFJaMzejMegL5vSJK-7X8jhQw8t_02ZSMXq_slGIGsQGoo_/exec",
            3: "https://script.google.com/macros/s/AKfycbypI-2OLsFCSflvSwmdKFybCJkZLPsbDo0o47imBVcVQJLTCL1UBBjrRUjBrGwkgw6R/exec",
            4: "https://script.google.com/macros/s/AKfycbyflcd8kQJdoVnNTfGhjmpr_pOVQ8NsOV0GtnHQYPc_azEAmBj0eZfbZU5Po7C_AXTNXw/exec",
            5: "https://script.google.com/macros/s/AKfycbz6E82rfK9vLqFVC4VuYVCmk4hNfLhG25BJQuR8Wsr8qIzOKgeFMo8JEBw_rAZw8i1w/exec"
        };

        let currentTeacher = null;
        let currentStudents = [];
        let attendanceRecord = {}; 

        // 1. LOG MASUK
        function login() {
            const ic = document.getElementById("ic-input").value.trim();
            if (teachers[ic]) {
                currentTeacher = teachers[ic];
                document.getElementById("login-error").style.display = "none";
                document.getElementById("login-section").classList.add("hidden");
                document.getElementById("selection-section").classList.remove("hidden");
                document.getElementById("bottom-menu").classList.remove("hidden");
                
                document.getElementById("welcome-text").innerText = "Selamat Datang, " + currentTeacher.name;
                
                // Set dropdown subjek
                const sel = document.getElementById("subject-select");
                sel.innerHTML = "";
                currentTeacher.subjects.forEach(s => {
                    sel.innerHTML += `<option value="${s.form}|${s.sub}">${s.sub} (Tingkatan ${s.form})</option>`;
                });
                
                // Set tarikh harini
                document.getElementById("date-select").valueAsDate = new Date();
            } else {
                document.getElementById("login-error").style.display = "block";
            }
        }

        // 2. MUAT TURUN PELAJAR (Parse CSV)
        async function loadStudents() {
            const subjVal = document.getElementById("subject-select").value;
            const form = parseInt(subjVal.split("|")[0]);
            const subjectName = subjVal.split("|")[1];
            
            document.getElementById("selection-section").classList.add("hidden");
            document.getElementById("attendance-section").classList.remove("hidden");
            document.getElementById("dashboard-section").classList.add("hidden");
            
            document.getElementById("display-subject").innerText = subjectName;
            document.getElementById("display-session").innerText = document.getElementById("session-select").value;
            document.getElementById("display-date").innerText = document.getElementById("date-select").value;
            
            document.getElementById("loading").classList.remove("hidden");
            document.getElementById("student-list").innerHTML = "";
            attendanceRecord = {}; 

            try {
                // Fetch CSV
                const response = await fetch(csvLinks[form]);
                const text = await response.text();
                
                // Simple CSV Parser (Asumsikan baris 1 adalah header)
                const rows = text.split("\n").map(r => r.split(","));
                currentStudents = [];

                for (let i = 1; i < rows.length; i++) {
                    if (rows[i].length >= 3) {
                        const nama = rows[i][0].trim();
                        const kelas = rows[i][1].trim();
                        const kolumC = rows[i][2].trim(); 
                        
                        // Filter mengikut nama subjek/kumpulan yang dipilih guru
                        if (kolumC.toUpperCase().includes(subjectName.toUpperCase())) {
                            currentStudents.push({ nama, kelas });
                        }
                    }
                }
                
                document.getElementById("loading").classList.add("hidden");
                renderStudentList();

            } catch (error) {
                document.getElementById("loading").innerText = "Gagal memuat turun data. Sila periksa sambungan internet.";
            }
        }

        // 3. PAPARAN SENARAI PELAJAR
        function renderStudentList() {
            const listDiv = document.getElementById("student-list");
            listDiv.innerHTML = "";
            
            if(currentStudents.length === 0) {
                listDiv.innerHTML = "<p>Tiada pelajar dijumpai untuk subjek ini.</p>";
                return;
            }

            currentStudents.forEach((std, index) => {
                const card = document.createElement("div");
                card.className = "student-card";
                card.innerHTML = `
                    <div class="student-name">${index + 1}. ${std.nama} (${std.kelas})</div>
                    <div class="att-buttons">
                        <button class="att-btn btn-hadir" onclick="markAtt(${index}, 'Hadir', this)" onkeydown="checkEnter(event, ${index})">Hadir</button>
                        <button class="att-btn btn-sebab" onclick="markAtt(${index}, 'TH Bersebab', this)" onkeydown="checkEnter(event, ${index})">TH Bersebab</button>
                        <button class="att-btn btn-tanpa" onclick="markAtt(${index}, 'TH Tanpa Sebab', this)" onkeydown="checkEnter(event, ${index})">TH Tanpa Sebab</button>
                    </div>
                `;
                listDiv.appendChild(card);
            });
        }

        // Feature lompat dengan butang "Enter"
        function checkEnter(event, currentIndex) {
            if (event.key === "Enter") {
                const allButtons = document.querySelectorAll('.btn-hadir'); // Lompat ke pelajar seterusnya
                if(allButtons[currentIndex + 1]) {
                    allButtons[currentIndex + 1].focus();
                }
            }
        }

        function markAtt(index, status, btnElement) {
            attendanceRecord[currentStudents[index].nama] = status;
            
            // Highlight butang yang dipilih
            const parent = btnElement.parentElement;
            const buttons = parent.querySelectorAll('.att-btn');
            buttons.forEach(b => b.classList.remove('selected'));
            btnElement.classList.add('selected');

            // Automatik lompat ke pelajar seterusnya jika di mobile (simulate keyboard next)
            const allHadirButtons = document.querySelectorAll('.btn-hadir');
            if(allHadirButtons[index + 1]) {
                 allHadirButtons[index + 1].focus();
            }
        }

        // 4. SIMPAN DAN HANTAR
        async function saveAndSubmit() {
            const subjVal = document.getElementById("subject-select").value;
            const form = parseInt(subjVal.split("|")[0]);
            const subjectName = subjVal.split("|")[1];
            const session = document.getElementById("session-select").value;
            const dateStr = document.getElementById("date-select").value;
            
            if(Object.keys(attendanceRecord).length === 0) {
                alert("Sila tandakan kehadiran sekurang-kurangnya seorang pelajar sebelum menghantar.");
                return;
            }

            const recordId = new Date().getTime().toString();
            const saveData = {
                id: recordId,
                date: dateStr,
                session: session,
                subject: subjectName,
                form: form,
                data: attendanceRecord
            };

            // Simpan ke LocalStorage
            let savedRecords = JSON.parse(localStorage.getItem("seepRecords")) || [];
            savedRecords.push(saveData);
            localStorage.setItem("seepRecords", JSON.stringify(savedRecords));

            // Hantar ke Google Apps Script (Simulation: standard POST)
            const scriptUrl = scriptLinks[form];
            try {
                // Nota: Menghantar data ke Google Apps Script dari web perlukan mode 'no-cors' 
                // atau Google Script perlu ada header CORS yang sah. 
                await fetch(scriptUrl, {
                    method: "POST",
                    mode: "no-cors", 
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        action: "insert",
                        date: dateStr,
                        session: session,
                        subject: subjectName,
                        attendance: attendanceRecord
                    })
                });
                alert("Data kehadiran berjaya disimpan di pangkalan data tempatan (LocalStorage) dan dihantar ke Google Sheet!");
                showDashboard();
            } catch(e) {
                alert("Ralat menghantar ke pelayan. Data disimpan ke dalam memori telefon buat sementara.");
                showDashboard();
            }
        }

        // 5. PAPARAN DASHBOARD (SEMAK REKOD)
        function showDashboard() {
            document.getElementById("selection-section").classList.add("hidden");
            document.getElementById("attendance-section").classList.add("hidden");
            document.getElementById("dashboard-section").classList.remove("hidden");

            const tbody = document.getElementById("dashboard-body");
            tbody.innerHTML = "";

            let savedRecords = JSON.parse(localStorage.getItem("seepRecords")) || [];
            
            if(savedRecords.length === 0) {
                tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>Tiada rekod disimpan.</td></tr>";
                return;
            }

            savedRecords.forEach((rec) => {
                const tr = document.createElement("tr");
                const totalStudents = Object.keys(rec.data).length;
                tr.innerHTML = `
                    <td>${rec.date}</td>
                    <td>${rec.session}</td>
                    <td>${rec.subject}</td>
                    <td>${totalStudents} Pelajar</td>
                    <td>
                        <button class="action-btn edit-btn" onclick="editRecord('${rec.id}')">Kemaskini</button>
                        <button class="action-btn del-btn" onclick="deleteRecord('${rec.id}', ${rec.form})">Hapus</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 6. KEMASKINI & HAPUS
        function editRecord(id) {
            alert("Mod kemaskini: Fungsi ini akan memuatkan semula rekod ke paparan untuk diubah.");
            // Logik lanjut: Cari id dalam localStorage, muatkan semula ke attendanceRecord dan buka panel attendance.
        }

        async function deleteRecord(id, form) {
            if(confirm("Adakah anda pasti untuk menghapus rekod ini dari peranti dan Pangkalan Data Master?")) {
                let savedRecords = JSON.parse(localStorage.getItem("seepRecords")) || [];
                savedRecords = savedRecords.filter(r => r.id !== id);
                localStorage.setItem("seepRecords", JSON.stringify(savedRecords));
                
                // Hantar isyarat hapus ke Google Apps script
                try {
                     await fetch(scriptLinks[form], {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ action: "delete", recordId: id })
                    });
                } catch(e) {}

                showDashboard();
            }
        }

        // 7. NAVIGASI LAIN
        function goBack() {
            if(!document.getElementById("attendance-section").classList.contains("hidden")) {
                document.getElementById("attendance-section").classList.add("hidden");
                document.getElementById("selection-section").classList.remove("hidden");
            } else if(!document.getElementById("dashboard-section").classList.contains("hidden")) {
                document.getElementById("dashboard-section").classList.add("hidden");
                document.getElementById("selection-section").classList.remove("hidden");
            }
        }

        function logout() {
            if(confirm("Adakah anda pasti untuk keluar? Data tidak akan hilang dari rekod Semakan.")) {
                currentTeacher = null;
                document.getElementById("ic-input").value = "";
                document.getElementById("login-section").classList.remove("hidden");
                document.getElementById("selection-section").classList.add("hidden");
                document.getElementById("attendance-section").classList.add("hidden");
                document.getElementById("dashboard-section").classList.add("hidden");
                document.getElementById("bottom-menu").classList.add("hidden");
            }
        }
    </script>
</body>
</html>
